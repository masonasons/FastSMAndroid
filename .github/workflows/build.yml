name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Get version
        id: version
        run: |
          version=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.FASTSM_RELEASE_STORE_FILE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          FASTSM_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          FASTSM_RELEASE_STORE_PASSWORD: ${{ secrets.FASTSM_RELEASE_STORE_PASSWORD }}
          FASTSM_RELEASE_KEY_ALIAS: ${{ secrets.FASTSM_RELEASE_KEY_ALIAS }}
          FASTSM_RELEASE_KEY_PASSWORD: ${{ secrets.FASTSM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: FastSM
          path: app/build/outputs/apk/release/FastSM.apk
          if-no-files-found: error
          retention-days: 90

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from commit ${{ github.sha }}

            **Version:** ${{ steps.version.outputs.version }}
            **Built:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.event.head_commit.message }}

            This release is automatically updated on every commit to main.

            ## Downloads
            - **Android APK:** FastSM.apk
          files: app/build/outputs/apk/release/FastSM.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
