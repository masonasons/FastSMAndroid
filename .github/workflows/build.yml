name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.FASTSM_RELEASE_STORE_FILE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          FASTSM_RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          FASTSM_RELEASE_STORE_PASSWORD: ${{ secrets.FASTSM_RELEASE_STORE_PASSWORD }}
          FASTSM_RELEASE_KEY_ALIAS: ${{ secrets.FASTSM_RELEASE_KEY_ALIAS }}
          FASTSM_RELEASE_KEY_PASSWORD: ${{ secrets.FASTSM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastSM
          path: app/build/outputs/apk/release/FastSM.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rolling release: delete the previous 'latest' tag + release so the
          # new one points at the current commit, then recreate with FastSM.apk
          # attached. The download URL
          # https://github.com/${{ github.repository }}/releases/download/latest/FastSM.apk
          # stays stable across runs.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "latest" \
            --notes "Automated build from ${GITHUB_SHA::7}" \
            --target "$GITHUB_SHA" \
            app/build/outputs/apk/release/FastSM.apk
